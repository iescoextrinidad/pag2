<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Laboratorio</title>
    <style>
        :root {
            --primary: #2c3e50;
            --arduino: #00979d;
            --print3d: #e67e22;
            --mongo: #4db33d;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            margin: 0;
            color: #333;
        }

        header {
            background: var(--primary);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card-header {
            padding: 15px;
            color: white;
            font-weight: bold;
        }

        .arduino-h { background: var(--arduino); }
        .print3d-h { background: var(--print3d); }
        .mongo-h { background: var(--mongo); }

        .card-body { padding: 15px; }

        .file-list {
            list-style: none;
            padding: 0;
        }

        .file-list li {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .file-list a {
            text-decoration: none;
            color: #444;
            display: block;
        }

        .file-list a:hover {
            color: var(--primary);
            font-weight: bold;
        }

        .badge {
            float: right;
            font-size: 0.7rem;
            background: #eee;
            padding: 2px 6px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<header>
    <h1>Portal de Recursos Técnicos</h1>
    <p>Acceso directo a las guías del taller</p>
</header>

<div class="container">
    <div class="category-grid" id="menu-principal"></div>
</div>

<script>
    // LISTA DE PÁGINAS: Solo editás aquí para agregar contenido
    const paginas = [
        { categoria: 'arduino', titulo: 'Introducción General', link: 'arduino.html' },
        { categoria: 'arduino', titulo: 'Guía de Pines y PWM', link: 'arduino2.html' },
        { categoria: 'print3d', titulo: 'Anatomía y Materiales', link: 'impresora3d.html' },
        { categoria: 'print3d', titulo: 'Flujo: STL a G-Code', link: 'impresora3d2.html' },
        { categoria: 'mongo', titulo: 'Configuración de Base de Datos', link: 'Mongo.html' },
        { categoria: 'mongo', titulo: 'Comandos y Consultas', link: 'Mongo1.html' },
        { categoria: 'mongo', titulo: 'Integración con Node.js', link: 'Mongo2.html' }
    ];

    const contenedor = document.getElementById('menu-principal');

    function generarMenu() {
        const categorias = {
            arduino: { titulo: '🤖 Arduino & Electrónica', clase: 'arduino-h' },
            print3d: { titulo: '🛠️ Impresión 3D', clase: 'print3d-h' },
            mongo: { titulo: '📊 Base de Datos', clase: 'mongo-h' }
        };

        let htmlFinal = '';

        for (let cat in categorias) {
            const archivos = paginas.filter(p => p.categoria === cat);
            
            if (archivos.length > 0) {
                htmlFinal += `
                    <div class="card">
                        <div class="card-header ${categorias[cat].clase}">
                            ${categorias[cat].titulo}
                        </div>
                        <div class="card-body">
                            <ul class="file-list">
                                ${archivos.map(a => `
                                    <li>
                                        <a href="${a.link}" target="_blank">
                                            ${a.titulo} <span class="badge">HTML</span>
                                        </a>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    </div>
                `;
            }
        }
        contenedor.innerHTML = htmlFinal;
    }

    generarMenu();
</script>

</body>
</html>
